<!doctype html><html><head><meta charset="utf-8"><title>JRM Slide — Team</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;overflow:hidden}
.slide{width:1280px;height:720px;background:#fff;color:var(--jrm-ink);position:relative;font-family:var(--font-sans)}
.frame{padding:80px;height:100%;display:flex;flex-direction:column}
.head{margin-bottom:48px}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--jrm-red);margin-bottom:14px}
.title{font-size:44px;font-weight:700;line-height:1.05;letter-spacing:-.02em;max-width:900px}
.title em{font-style:normal;color:var(--jrm-red)}
.tree{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;position:relative}
.row{display:flex;gap:32px;justify-content:center;width:100%}
.row1{margin-bottom:48px}
.connector{width:2px;background:var(--jrm-gray-300);height:48px;margin:-1px 0}
.h-line{height:2px;background:var(--jrm-gray-300);width:540px;margin:-1px 0}
.mem{background:#fff;border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:0;box-shadow:var(--shadow-1);overflow:hidden;width:280px}
.mem .accent{height:4px;background:var(--jrm-red)}
.mem.lead .accent{background:var(--jrm-ink)}
.mem.lead{box-shadow:var(--shadow-2)}
.mem .body{display:flex;gap:14px;padding:14px}
.mem .ph{width:64px;height:64px;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--jrm-gray-200),var(--jrm-gray-300));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--jrm-gray-600);font-size:22px}
.mem .info{display:flex;flex-direction:column;justify-content:center}
.mem .nm{font-size:16px;font-weight:700;line-height:1.2}
.mem .ti{font-size:13px;color:var(--fg-2);margin-top:4px}
.foot{position:absolute;bottom:40px;left:80px;right:80px;display:flex;justify-content:space-between;font-size:12px;color:var(--fg-3);letter-spacing:.04em}
.foot img{height:20px;opacity:.7}
</style></head><body>
<div class="slide">
  <div class="frame">
    <div class="head">
      <div class="eyebrow">Your Team</div>
      <div class="title">The same senior team — <em>on-site every day.</em></div>
    </div>
    <div class="tree">
      <div class="row row1">
        <div class="mem lead"><div class="accent"></div><div class="body"><div class="ph">RR</div><div class="info"><div class="nm">Robert Russo</div><div class="ti">VP, Interiors</div></div></div></div>
      </div>
      <div class="connector"></div>
      <div class="h-line"></div>
      <div class="connector"></div>
      <div class="row">
        <div class="mem"><div class="accent"></div><div class="body"><div class="ph">MD</div><div class="info"><div class="nm">Maggie Desmond, RA</div><div class="ti">Senior Project Manager</div></div></div></div>
        <div class="mem"><div class="accent"></div><div class="body"><div class="ph">JT</div><div class="info"><div class="nm">James Toomey</div><div class="ti">Project Superintendent</div></div></div></div>
      </div>
    </div>
  </div>
  <div class="foot"><img src="../assets/logo-horizontal.png" alt=""><div>06 · 18</div></div>
</div>
</body></html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JRM Team Slide Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="panel panel-left">
      <div class="panel-header">
        <h2>Team Library</h2>
        <p>Drag people onto the slide canvas</p>
      </div>

      <div class="field-stack compact">
        <label for="memberSearch">Search</label>
        <input id="memberSearch" type="text" placeholder="Name, title, department" />
      </div>

      <div class="field-stack compact">
        <label for="memberDepartmentFilter">Department</label>
        <select id="memberDepartmentFilter"></select>
      </div>

      <div id="libraryList" class="library-list"></div>

      <details class="add-member-box">
        <summary>Add Team Member</summary>
        <div class="field-stack compact">
          <label for="newMemberName">Name</label>
          <input id="newMemberName" type="text" placeholder="Jane Smith" />
        </div>
        <div class="field-stack compact">
          <label for="newMemberTitle">Position</label>
          <input id="newMemberTitle" type="text" placeholder="Project Executive" />
        </div>
        <div class="field-stack compact">
          <label for="newMemberDepartment">Department</label>
          <input id="newMemberDepartment" type="text" placeholder="Pre Construction" />
        </div>
        <div class="field-stack compact">
          <label for="newMemberPhoto">Photo</label>
          <input id="newMemberPhoto" type="file" accept="image/*" />
        </div>
        <button id="addMemberBtn" class="btn btn-primary" type="button">Add Member</button>
      </details>
    </aside>

    <main class="center-stage">
      <div class="canvas-toolbar">
        <div class="toolbar-group">
          <button id="clearCanvasBtn" class="btn" type="button">Clear Canvas</button>
          <button id="autoSortBtn" class="btn" type="button">Reflow Rows</button>
          <label class="check-wrap">
            <input id="autoConnectToggle" type="checkbox" checked />
            Auto connectors
          </label>
        </div>
        <div class="toolbar-group">
          <span id="connectHint" class="hint">Tip: Click one card, then another card to create a manual connector.</span>
        </div>
      </div>

      <div id="previewHost" class="preview-host">
        <div id="slidePreview" class="slide-preview">
          <div id="slideHeader" class="slide-header">
            <h1 id="slideTitle" class="slide-title">PRE-CONSTRUCTION PROJECT TEAM</h1>
          </div>

          <div id="slideBody" class="slide-body">
            <svg id="connectorLayer" class="connector-layer" viewBox="0 0 1280 720" preserveAspectRatio="none"></svg>
            <div id="cardLayer" class="card-layer"></div>
          </div>

        </div>
      </div>
    </main>

    <aside class="panel panel-right">
      <div class="panel-header">
        <h2>Canvas Controls</h2>
        <p>Theme, layout, and exports</p>
      </div>

      <div class="control-section">
        <h3 class="section-title">Colors</h3>
        <div class="grid-2">
          <div class="field-stack compact">
            <label for="bgColorInput">Background</label>
            <input id="bgColorInput" type="color" />
          </div>
          <div class="field-stack compact">
            <label for="accentColorInput">Accent</label>
            <input id="accentColorInput" type="color" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field-stack compact">
            <label for="headingColorInput">Heading Color</label>
            <input id="headingColorInput" type="color" />
          </div>
          <div class="field-stack compact">
            <label for="cardBgInput">Card Background</label>
            <input id="cardBgInput" type="color" />
          </div>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="control-section">
        <h3 class="section-title">Typography</h3>
        <div class="grid-2">
          <div class="field-stack compact">
            <label for="headingSizeInput">Title Size</label>
            <input id="headingSizeInput" type="range" min="24" max="88" />
          </div>
          <div class="field-stack compact">
            <label for="headingFontInput">Title Font</label>
            <select id="headingFontInput">
              <option value="Sora">Sora</option>
              <option value="Manrope">Manrope</option>
              <option value="Arial Black">Arial Black</option>
              <option value="Georgia">Georgia</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <label class="check-wrap">
            <input id="headingBoldInput" type="checkbox" checked />
            Bold Title
          </label>
        </div>
        <div class="grid-2">
          <div class="field-stack compact">
            <label for="nameSizeInput">Name Size</label>
            <input id="nameSizeInput" type="range" min="14" max="34" />
          </div>
          <div class="field-stack compact">
            <label for="titleSizeInput">Role Size</label>
            <input id="titleSizeInput" type="range" min="12" max="30" />
          </div>
        </div>
        <div class="grid-2">
          <label class="check-wrap">
            <input id="nameBoldInput" type="checkbox" checked />
            Bold Names
          </label>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="control-section">
        <h3 class="section-title">Card Style</h3>
        <div class="grid-2">
          <label class="check-wrap">
            <input id="cardShadowInput" type="checkbox" checked />
            Card Shadow
          </label>
          <label class="check-wrap">
            <input id="cardOutlineInput" type="checkbox" checked />
            Card Outline
          </label>
        </div>
        <div class="field-stack compact">
          <label for="cardRadiusInput">Card Radius</label>
          <input id="cardRadiusInput" type="range" min="0" max="42" />
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="control-section">
        <h3 class="section-title">Background</h3>
        <div class="field-stack compact">
          <label for="backgroundImageInput">Background Image</label>
          <input id="backgroundImageInput" type="file" accept="image/*" />
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="control-section">
        <h3 class="section-title">Export</h3>
        <div class="export-actions">
          <button id="exportPngBtn" class="btn" type="button">Export PNG</button>
          <button id="exportPdfBtn" class="btn" type="button">Export PDF</button>
          <button id="exportPptxBtn" class="btn" type="button">Export PPTX</button>
          <button id="exportHtmlBtn" class="btn" type="button">Export HTML</button>
        </div>
      </div>

      <div id="statusText" class="status-text" role="status" aria-live="polite"></div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
